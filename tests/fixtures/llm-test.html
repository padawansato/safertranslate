<!DOCTYPE html>
<html>
<head><title>LLM Direct Test</title></head>
<body>
<h1>Transformers.js Direct Test</h1>
<pre id="log"></pre>
<script type="module">
const log = document.getElementById('log');
function addLog(msg) {
  log.textContent += msg + '\n';
  console.log(msg);
}

try {
  addLog('Importing Transformers.js...');
  const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');

  addLog('Setting up...');
  env.backends.onnx.wasm.numThreads = 1;

  addLog('Loading model Xenova/m2m100_418M...');
  const translator = await pipeline('translation', 'Xenova/m2m100_418M', {
    progress_callback: (p) => {
      if (p.status === 'progress') {
        addLog(`DL: ${p.file} ${Math.round(p.progress)}%`);
      } else {
        addLog(`Status: ${p.status} ${p.file || ''}`);
      }
    }
  });

  addLog('Translating "Hello, how are you?"...');
  const result = await translator('Hello, how are you?', { src_lang: 'en', tgt_lang: 'ja' });
  addLog('Result: ' + JSON.stringify(result));
} catch (e) {
  addLog('ERROR: ' + e.message);
  addLog('Stack: ' + e.stack);
}
</script>
</body>
</html>
