name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint / Typecheck / Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run

  build:
    name: Build (Chrome + Safari)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run build:safari
      - uses: actions/upload-artifact@v4
        with:
          name: dist-chrome
          path: dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist-chrome
          path: dist/
      - run: npx playwright install --with-deps chromium

      - name: Run functional E2E tests
        run: xvfb-run npx playwright test tests/e2e/extension.test.ts

      - name: Check Linux baselines exist
        id: baselines
        run: |
          if [ -f tests/e2e/visual.test.ts-snapshots/popup-initial-chromium-linux.png ]; then
            echo "exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "exist=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run visual regression tests
        if: steps.baselines.outputs.exist == 'true'
        run: xvfb-run npx playwright test tests/e2e/visual.test.ts

      - name: Generate Linux baselines (first run)
        if: steps.baselines.outputs.exist == 'false'
        run: |
          echo "::warning::Linux baselines not found. Generating initial baselines."
          xvfb-run npx playwright test tests/e2e/visual.test.ts --update-snapshots || true

      - name: Upload visual baselines for commit
        if: steps.baselines.outputs.exist == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: linux-baselines
          path: tests/e2e/visual.test.ts-snapshots/*-linux.png
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
